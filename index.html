async function genTactics(goalTitle,wgoalId){
  const btn=document.getElementById('aiTacBtn');const out=document.getElementById('aiTacOut');
  btn.innerHTML='<span class="spinner"></span>Soch raha hu...';btn.disabled=true;
  try{
    const r=await fetch('/api/ai-steps',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({idea:goalTitle,mode:'tactics'})});
    const j=await r.json();
    if(j.steps&&j.steps.length){
      out.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:8px">Suggested tactics (jo chahiye uspe Add dabao):</div>'+
        j.steps.map(t=>`<div class="ai-tac">
          <span>${esc(t)}</span>
          <button class="btn sm" onclick="quickAddTactic('${wgoalId}',this)" data-t="${esc(t)}">+ Add</button>
        </div>`).join('');
    }else{out.innerHTML='<span style="color:#b42318">'+(j.error||'Kuch nahi mila')+'</span>'}
  }catch(e){out.innerHTML='<span style="color:#b42318">AI error: '+esc(e.message)+'</span>'}
  btn.innerHTML='🤖 Dobara suggest karwao';btn.disabled=false;
}

async function quickAddTactic(wgoalId,btn){
  const t=btn.getAttribute('data-t');
  await sb.from('plan_tactics').insert({wgoal_id:wgoalId,owner_id:ME.id,title:t});
  btn.textContent='✓ Added';btn.disabled=true;btn.classList.add('green');
}

async function addOneTactic(wgoalId){
  const inp=document.getElementById('manualTac');
  const t=inp.value.trim();
  if(!t){toast('Kuch likho');return}
  await sb.from('plan_tactics').insert({wgoal_id:wgoalId,owner_id:ME.id,title:t});
  inp.value='';toast('Tactic add ho gaya');
}

async function newTactic(wgoalId){
  const {data:g}=await sb.from('plan_wgoals').select('title').eq('id',wgoalId).single();
  openTacticAI(wgoalId,g?g.title:'Goal');
}

async function editWGoal(id,curTitle,curLag){
  const title=prompt('Goal title:',curTitle);
  if(title===null)return;
  const lag=prompt('Lag target (result):',curLag);
  await sb.from('plan_wgoals').update({title:title.trim(),lag_target:(lag||'').trim()||null}).eq('id',id);
  toast('Goal update ho gaya ✏️');loadW12();
}
async function delWGoal(id){
  if(!confirm('Ye goal aur iske saare tactics delete ho jayenge. Pakka?'))return;
  await sb.from('plan_wgoals').delete().eq('id',id);
  toast('Goal delete');loadW12();
}
async function editTactic(id,curTitle,curWeek){
  const title=prompt('Tactic:',curTitle);
  if(title===null)return;
  const wk=prompt('Focus week (1-12, ya khaali):',curWeek||'');
  const wkNum=wk&&!isNaN(wk)?Math.max(1,Math.min(12,parseInt(wk))):null;
  await sb.from('plan_tactics').update({title:title.trim(),focus_week:wkNum}).eq('id',id);
  toast('Tactic update ho gaya ✏️');loadW12();
}
async function delTactic(id){
  if(!confirm('Ye tactic delete ho jayegi. Pakka?'))return;
  await sb.from('plan_tactics').delete().eq('id',id);
  toast('Tactic delete');loadW12();
}

async function loadNotes(ptype,pid){
  const {data,error}=await sb.from('plan_notes').select('*')
    .eq('parent_type',ptype).eq('parent_id',pid).order('created_at',{ascending:false});
  const el=document.getElementById('noteHistory');
  if(!el)return;
  if(error){el.innerHTML='<div class="empty" style="padding:14px">Error</div>';return}
  if(!data||!data.length){el.innerHTML='<div class="empty" style="padding:14px">Abhi koi note nahi. Upar se add karo.</div>';return}
  window.__noteCache=window.__noteCache||{};
  el.innerHTML='<div class="note-hist-h">History (timeline)</div>'+data.map(n=>{
    window.__noteCache[n.id]=n.note;
    const dt=new Date(n.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    const exp=n.expected_date?`<div class="note-exp">🎯 Expected complete: ${new Date(n.expected_date).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>`:'';
    const att=n.attachment_url?`<a class="note-att" href="${n.attachment_url}" target="_blank">📎 ${esc(n.attachment_name||'File dekho')}</a>`:'';
    return `<div class="note-item">
      <div class="note-txt">${esc(n.note)}</div>
      ${exp}${att}
      <div class="note-msgrow">
        <button class="note-msg" onclick="noteToMsg('${n.id}','email')">📧 Mail banao</button>
        <button class="note-msg" onclick="noteToMsg('${n.id}','whatsapp')">💬 WhatsApp banao</button>
      </div>
      <div id="mc-${n.id}"></div>
      <div class="note-meta">${dt}${n.met_with?' · 👤 '+esc(n.met_with):''} <button class="note-del" onclick="delNote('${n.id}','${ptype}','${pid}')">✕</button></div>
    </div>`;
  }).join('');
}

async function noteToMsg(id,type){
  const txt=window.__noteCache&&window.__noteCache[id];
  if(!txt){toast('Note nahi mila');return}
  const box=document.getElementById('mc-'+id);
  box.innerHTML='<div class="polish-load">✨ '+(type==='email'?'Mail':'WhatsApp message')+' ban raha hai...</div>';
  try{
    const r=await fetch('/api/ai-steps',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({idea:txt,mode:type})});
    const j=await r.json();
    if(j.error){box.innerHTML='<div class="polish-load">Error: '+esc(j.error)+'</div>';return}
    window.__msgCache=window.__msgCache||{};
    if(type==='email'){
      const full='Subject: '+(j.subject||'')+'\n\n'+(j.body||'');
      window.__msgCache[id]=full;
      box.innerHTML=`<div class="msg-box">
        <div class="msg-sub">📧 <b>${esc(j.subject||'')}</b></div>
        <div class="msg-txt">${esc(j.body||'').replace(/\n/g,'<br>')}</div>
        <div class="msg-actions">
          <button class="btn sm" onclick="copyMsg('${id}')">📋 Copy karo</button>
          <a class="btn sm ghost" href="mailto:?subject=${encodeURIComponent(j.subject||'')}&body=${encodeURIComponent(j.body||'')}">📧 Mail app kholo</a>
        </div>
      </div>`;
    }else{
      window.__msgCache[id]=j.text||'';
      box.innerHTML=`<div class="msg-box">
        <div class="msg-txt">${esc(j.text||'').replace(/\n/g,'<br>')}</div>
        <div class="msg-actions">
          <button class="btn sm" onclick="copyMsg('${id}')">📋 Copy karo</button>
          <a class="btn sm ghost" href="https://wa.me/?text=${encodeURIComponent(j.text||'')}" target="_blank">💬 WhatsApp kholo</a>
        </div>
      </div>`;
    }
  }catch(e){box.innerHTML='<div class="polish-load">Error: '+esc(e.message)+'</div>';}
}
function copyMsg(id){

async function addNote(ptype,pid){
  const note=document.getElementById('noteText').value.trim();
  const fileEl=document.getElementById('noteFile');
  const file=fileEl&&fileEl.files&&fileEl.files[0];
  if(!note&&!file){toast('Kuch likho ya file attach karo');return}
  const met=document.getElementById('noteWith').value.trim()||null;
  const exp=document.getElementById('noteExpected').value||null;
  const btn=document.getElementById('noteAddBtn');

  let attachUrl=null,attachName=null;
  if(file){
    if(file.size>15*1024*1024){toast('File 15MB se badi hai — chhoti file lo');return}
    if(btn){btn.disabled=true;btn.textContent='📎 Upload ho rahi...';}
    try{
      const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const path=ME.id+'/'+Date.now()+'_'+safe;
      const {error:upErr}=await sb.storage.from('plan-files').upload(path,file);
      if(upErr)throw upErr;
      const {data:pub}=sb.storage.from('plan-files').getPublicUrl(path);
      attachUrl=pub.publicUrl;attachName=file.name;
    }catch(e){
      toast('File upload fail: '+e.message);
      if(btn){btn.disabled=false;btn.textContent='+ Note add karo';}
      return;
    }
  }

  await sb.from('plan_notes').insert({owner_id:ME.id,parent_type:ptype,parent_id:pid,note:note||('📎 '+(attachName||'File')),met_with:met,expected_date:exp,attachment_url:attachUrl,attachment_name:attachName});
  document.getElementById('noteText').value='';
  document.getElementById('noteWith').value='';
  document.getElementById('noteExpected').value='';
  if(fileEl)fileEl.value='';
  if(btn){btn.disabled=false;btn.textContent='+ Note add karo';}
  toast('Note save 📝'+(attachUrl?' (file ke saath)':''));loadNotes(ptype,pid);
  if(ptype==='tactic'||ptype==='wgoal'){if(typeof loadW12==='function')loadW12();}
  if(ptype==='strat_tactic'){if(typeof loadStrategy==='function')loadStrategy();}
  if(ptype==='goal'||ptype==='step'){const gv=document.getElementById('view-goals');if(gv&&!gv.classList.contains('hide'))loadGoals();}

  // agla follow-up schedule karo
  setTimeout(async()=>{
    const when=prompt('📅 Agla follow-up kab? (date daalo: YYYY-MM-DD)\n\nJaise 2026-07-05\n\n(Cancel dabao agar follow-up nahi chahiye)',exp||'');
    if(when&&/^\d{4}-\d{2}-\d{2}$/.test(when.trim())){
      const d=when.trim();
      const title=(note||attachName||'Follow-up').slice(0,120);
      await sb.from('plan_followups').insert({owner_id:ME.id,title,source_type:ptype,source_id:pid,assigned_name:met||null,first_date:d,due_date:d});
      toast('Follow-up '+new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' ko scheduler me add ✓');
    }else if(when!==null){
      toast('Date galat format — follow-up nahi bana (YYYY-MM-DD daalo)');
    }
  },400);
}

async function toggleWeek(tacticId,week,wasDone){
  const newDone=!wasDone;
  // jab DONE mark kar rahe ho, confirm karo "pakka complete?"
  if(newDone){
    const ok=confirm('Ye kaam PURA ho gaya?\n\nAgar abhi chal raha hai (jaise meeting hui par deal final nahi), to Cancel dabao — note me progress likho, aur jab pura ho tab tick karo.');
    if(!ok)return;
  }
  const {data:existing}=await sb.from('plan_weekly').select('id').eq('tactic_id',tacticId).eq('week_no',week);
  if(existing&&existing.length){
    await sb.from('plan_weekly').update({done:newDone}).eq('id',existing[0].id);
  }else{
    await sb.from('plan_weekly').insert({tactic_id:tacticId,week_no:week,done:newDone});
  }
  if(newDone)toast('Complete! 🎉');
  loadW12();
}

      // ===== DELEGATION FOLLOW-UP TRACKER =====

      if(dIds.length){

async function loadVision(){

  html+=`<div class="vision-sheet">

  VISION_STEPS.forEach((s,i)=>{

    html+=`<div class="vstep ${isDone?'vdone':''}" onclick="toggleVision('${s.key}',${isDone?'true':'false'})">
      <div class="vstep-draw">${visionDraw(s.draw,isDone)}</div>

      </div>
    </div>`;

  html+=`<div class="vsheet-quote">"Customer product nahi kharidta, customer trust kharidta hai"</div>

  root.innerHTML=html;

async function toggleVision(key,wasDone){
  const nd=!wasDone;
  try{
    await sb.from('plan_vision').upsert({step_key:key,done:nd,updated_at:new Date().toISOString()},{onConflict:'step_key'});

  loadVision();
}

  d.cycles=cycles||[];

  d.active=active;

function barChart(data,maxVal,unit){
  const max=maxVal||Math.max(...data.map(d=>d.val));
  return `<div class="bc-bars">`+data.map(d=>{
    const pct=Math.round(d.val/max*100);
    return `<div class="bc-col">
      <div class="bc-val">${d.val}</div>
      <div class="bc-bar-wrap"><div class="bc-bar" style="height:${Math.max(pct,4)}%;background:${d.color}"></div></div>
      <div class="bc-lbl">${d.label}</div>
    </div>`;
  }).join('')+`</div><div class="bc-unit">${unit||''}</div>`;
}

      const dt=new Date(n.created_at).toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      const att=n.attachment_url?`<a class="iln-att" href="${n.attachment_url}" target="_blank" onclick="event.stopPropagation()">📎 ${esc((n.attachment_name||'File').slice(0,22))}</a>`:'';
      return `<div class="iln"><span class="iln-dot">●</span><div><div class="iln-txt">${esc(n.note)}</div>${att}<div class="iln-meta">${dt}</div></div></div>`;
    }).join('')+`</div>`;
  };

  const wkRange=weekDateRange(scyc.start_date,sw);
  html+=`<div class="w12-head">
    <div class="w12-title">📈 ${esc(scyc.title)}</div>
    <div class="w12-sub">Week ${sw} of 12 · ${wkRange}</div>
  </div>`;
  html+=`<div class="sum-btns">
    <button class="btn sm ghost" onclick="downloadStratSummary()">📄 Strategy Summary</button>
  </div>`;

  // group by goal_area
  const areas=[...new Set(tacs.map(t=>t.goal_area||'Other'))];
  areas.forEach(area=>{
    const at=tacs.filter(t=>(t.goal_area||'Other')===area);
    html+=`<div class="wgoal">
      <div class="wgoal-head"><div class="wg-title">${esc(area)}</div></div>`;
    at.forEach(t=>{
      const safe=esc(t.title).replace(/'/g,"\\'");
      const hasDetail=t.detail&&t.detail.trim();
      html+=`<div class="tac-row">
        <div class="tac-title">
          <span class="tac-title-txt">${esc(t.title)}${t.assigned_name?` <span class="who-chip sm">👤 ${esc(t.assigned_name)}</span>`:''}</span>
          <span class="tac-btns">${hasDetail?`<button class="mini-edit" onclick="toggleStratDetail('${t.id}')" title="Deep detail">${'💡'}</button>`:''}<button class="mini-edit" onclick="openNotes('strat_tactic','${t.id}','${safe}')" title="Notes">📝</button></span>
        </div>`;
      if(hasDetail){
        html+=`<div id="sdet-${t.id}" class="strat-detail hide">
          <div class="sd-how">${esc(t.detail)}</div>
          ${t.target?`<div class="sd-target">🎯 <b>Target:</b> ${esc(t.target)}</div>`:''}
        </div>`;
      }
      html+=`<div class="wk-cells">`;
      for(let w=1;w<=12;w++){
        const done=t.focus_week===w && t.done;
        const isFocus=t.focus_week===w;
        const ws=new Date(scyc.start_date);ws.setDate(ws.getDate()+(w-1)*7);
        const wd=ws.getDate()+'/'+(ws.getMonth()+1);
        if(isFocus){
          html+=`<div class="wk-cell ${done?'wk-done':''} ${w===sw?'wk-cur':''}" onclick="toggleStratTactic('${t.id}',${done?'true':'false'})" title="Week ${w}">${done?'✓':`<b>${w}</b><i>${wd}</i>`}</div>`;
        }else{
          html+=`<div class="wk-cell wk-off" title="Week ${w}"><b>${w}</b><i>${wd}</i></div>`;
        }
      }
      html+=`</div>`+window.__stratNotesHtml(t.id)+`</div>`;
    });
    html+=`</div>`;
  });

  root.innerHTML=html;
}

// ====== FOLLOW-UP SCHEDULER (task lifecycle) ======
async function carryForwardFollowups(){
  // pending followups jinki due_date < aaj → aaj pe le aao, slip +1
  const today=todayStr();
  const {data:overdue}=await sb.from('plan_followups').select('*').eq('owner_id',ME.id).eq('status','pending').lt('due_date',today);
  if(overdue&&overdue.length){
    for(const f of overdue){
      const daysMissed=Math.floor((new Date(today)-new Date(f.due_date))/(24*3600*1000));
      await sb.from('plan_followups').update({due_date:today,slip_count:(f.slip_count||0)+daysMissed,updated_at:new Date().toISOString()}).eq('id',f.id);
    }
  }
}

async function followupScore(){
  const {data:all}=await sb.from('plan_followups').select('slip_count,status,done_on_time').eq('owner_id',ME.id);
  if(!all||!all.length)return null;
  const done=all.filter(f=>f.status==='done');
  const onTime=done.filter(f=>f.done_on_time).length;
  const totalSlips=all.reduce((s,f)=>s+(f.slip_count||0),0);
  const pct=done.length?Math.round(onTime/done.length*100):100;
  return {pct,onTime,doneCount:done.length,totalSlips,pending:all.filter(f=>f.status==='pending').length};
}

async function renderFollowupSection(){
  const {data:fus}=await sb.from('plan_followups').select('*').eq('owner_id',ME.id).eq('status','pending').order('due_date');
  const score=await followupScore();
  let html='';
  if(score){
    const sc=score.pct>=80?'g':score.pct>=50?'a':'r';
    html+=`<div class="fscore fscore-${sc}">
      <div class="fsc-main"><b>${score.pct}%</b> on-time score</div>
      <div class="fsc-sub">${score.doneCount} done · ${score.pending} pending · ${score.totalSlips} total slips</div>
    </div>`;
  }
  if(fus&&fus.length){
    const today=todayStr();
    html+=fus.map(f=>{
      const isToday=f.due_date===today;
      const overdue=f.due_date<today;
      const slip=f.slip_count>0?`<span class="fu-slip">${f.slip_count}x delay</span>`:'';
      const safe=esc(f.title).replace(/'/g,"\\'");
      return `<div class="fu-card ${overdue?'fu-od':isToday?'fu-td':''}">
        <button class="fu-check" onclick="doneFollowup('${f.id}')" title="Complete">○</button>
        <div class="fu-info">
          <div class="fu-title">${esc(f.title)}</div>
          <div class="fu-meta">📅 ${new Date(f.due_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}${f.assigned_name?' · 👤 '+esc(f.assigned_name):''} ${slip}</div>
        </div>
        <div class="fu-acts">
          <button class="fu-mini" onclick="forwardFollowup('${f.id}','${safe}')" title="Kisi aur ko forward">➡️</button>
        </div>
      </div>`;
    }).join('');
  }else{
    html+='<div class="hc-empty">Koi pending follow-up nahi 🎉</div>';
  }
  return html;
}

// ====== CALENDAR (kisi bhi din ka slot) ======
let CAL_DATE=null;
let CAL_MODE='day';
function loadCal(){ if(!CAL_DATE)CAL_DATE=todayStr(); renderCal(); }
function shiftCal(dir){
  const d=new Date(CAL_DATE);
  d.setDate(d.getDate()+(CAL_MODE==='week'?dir*7:dir));
  CAL_DATE=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  renderCal();
}
function calModeSet(m){CAL_MODE=m;renderCal();}

async function renderCal(){
  const root=document.getElementById('view-cal');
  root.innerHTML='<div class="empty">Loading...</div>';
  // is range ka data
  let from,to;
  if(CAL_MODE==='week'){
    const d=new Date(CAL_DATE);const dow=(d.getDay()+6)%7; // Mon=0
    const mon=new Date(d);mon.setDate(d.getDate()-dow);
    from=isoD(mon); const sun=new Date(mon);sun.setDate(mon.getDate()+6);to=isoD(sun);
  }else{from=CAL_DATE;to=CAL_DATE;}

  // calendar bookings
  const {data:cal}=await sb.from('plan_calendar').select('*').eq('owner_id',ME.id).gte('cal_date',from).lte('cal_date',to);
  // goal steps scheduled in range
  const {data:steps}=await sb.from('plan_steps').select('id,title,scheduled_date,time_slot,is_done').gte('scheduled_date',from).lte('scheduled_date',to);
  // tactics scheduled
  const {data:tacs}=await sb.from('plan_tactics').select('id,title,scheduled_date,time_slot').gte('scheduled_date',from).lte('scheduled_date',to);

  const allItems=(dt)=>{
    const items=[];
    (cal||[]).filter(x=>x.cal_date===dt).forEach(x=>items.push({slot:x.time_slot,title:x.title,type:'cal',id:x.id,done:x.done}));
    (steps||[]).filter(x=>x.scheduled_date===dt&&!x.is_done).forEach(x=>items.push({slot:x.time_slot,title:x.title,type:'step',id:x.id}));
    (tacs||[]).filter(x=>x.scheduled_date===dt).forEach(x=>items.push({slot:x.time_slot,title:x.title,type:'tactic',id:x.id}));
    return items;
  };

  let html=`<div class="cal-head">
    <div class="cal-nav">
      <button class="bbtn cal-arrow" onclick="shiftCal(-1)">‹</button>
      <div class="cal-title">${calTitle(from,to)}</div>
      <button class="bbtn cal-arrow" onclick="shiftCal(1)">›</button>
    </div>
    <div class="cal-modes">
      <button class="cal-mode ${CAL_MODE==='day'?'on':''}" onclick="calModeSet('day')">Din</button>
      <button class="cal-mode ${CAL_MODE==='week'?'on':''}" onclick="calModeSet('week')">Hafta</button>
      <button class="cal-mode" onclick="CAL_DATE=todayStr();renderCal()">Aaj</button>
    </div>
  </div>`;

  // ===== Follow-up scheduler (pending kaam, carry-forward, score) =====
  await carryForwardFollowups();
  const fuHtml=await renderFollowupSection();
  html+=`<div class="fu-section">
    <div class="fu-sec-h">🔔 Follow-up Scheduler</div>
    ${fuHtml}
  </div>`;

  if(CAL_MODE==='day'){
    html+=`<div class="cal-day">`;
    for(const slot of SLOTS){
      const items=allItems(CAL_DATE).filter(i=>i.slot===slot);
      html+=`<div class="cal-slot ${items.length?'filled':''}">
        <div class="cal-time">${slot}</div>
        <div class="cal-body">
          ${items.map(i=>`<div class="cal-task t-${i.type}">${i.type==='cal'?'📅':i.type==='tactic'?'🎯':'○'} ${esc(i.title)}${i.type==='cal'?` <button class="note-del" onclick="delCalItem('${i.id}')">✕</button>`:''}</div>`).join('')}
          <button class="cal-add" onclick="addCalItem('${CAL_DATE}','${slot}')">+ kaam</button>
        </div>
      </div>`;
    }
    html+='</div>';
  } else {
    // week: 7 columns
    const d=new Date(from);
    html+='<div class="cal-week">';
    for(let i=0;i<7;i++){
      const day=new Date(d);day.setDate(d.getDate()+i);const ds=isoD(day);
      const items=allItems(ds);
      const isToday=ds===todayStr();
      html+=`<div class="cal-wday ${isToday?'cw-today':''}">
        <div class="cw-head" onclick="CAL_DATE='${ds}';CAL_MODE='day';renderCal()">
          ${day.toLocaleDateString('en-IN',{weekday:'short'})}<br><b>${day.getDate()}</b>
        </div>
        <div class="cw-items">
          ${items.length?items.map(i=>`<div class="cw-item t-${i.type}" title="${esc(i.title)}">${i.slot?i.slot.split('–')[0]+' ':''}${esc(i.title.slice(0,18))}</div>`).join(''):'<div class="cw-empty">—</div>'}
        </div>
      </div>`;
    }
    html+='</div>';
  }
  root.innerHTML=html;
}

function calTitle(from,to){
  const f=d=>new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
  if(from===to){
    const d=new Date(from);
    return d.toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  }
  return f(from)+' – '+f(to);
}
function isoD(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

async function addCalItem(date,slot){
  const title=prompt('Kya kaam/meeting? ('+slot+')');
  if(!title||!title.trim())return;
  await sb.from('plan_calendar').insert({owner_id:ME.id,cal_date:date,time_slot:slot,title:title.trim()});
  toast('Slot book ho gaya 📅');renderCal();
}
async function delCalItem(id){
  await sb.from('plan_calendar').delete().eq('id',id);
  toast('Hata diya');renderCal();
}

let DAILY_VIEW_DATE=null;
function loadDaily(){DAILY_VIEW_DATE=todayStr();renderDaily()}

async function renderDaily(){
  const root=document.getElementById('view-daily');
  const d=DAILY_VIEW_DATE||todayStr();
  const isToday=d===todayStr();

  // log input box (sirf aaj ke liye)
  let html='';
  if(isToday){
    html+=`<div class="capture">
      <h3>📓 Aaj kya kiya? — bolo ya likho</h3>
      <textarea id="dailyText" placeholder="jaise: Domino's se 500 container ka order enquiry aaya, kal quote bhejna hai"></textarea>
      <div class="cap-row">
        <button class="mic" id="dMicBtn" onclick="toggleDailyMic()" title="Bolke likho">🎤</button>
        <button class="btn ghost sm" onclick="polishDaily()">✨ Professional</button>
        <button class="btn" id="dLogBtn" onclick="addDaily()">Log karo</button>
      </div>
      <div style="margin-top:8px"><input type="file" id="dailyFile" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.csv" style="font-size:12px"> <span style="font-size:11px;color:var(--muted)">📎 optional</span></div>
      <div id="dPolishOut"></div>
    </div>`;
    html+='<div id="timerBox"></div>';
  }

  // date nav
  html+=`<div class="date-nav">
    <button onclick="shiftDaily(-1)">‹ Pichla</button>
    <span>${new Date(d).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'short'})}${isToday?' (Aaj)':''}</span>
    <button onclick="shiftDaily(1)" ${isToday?'disabled':''}>Agla ›</button>
  </div>`;

  root.innerHTML=html+'<div id="dailyList"><div class="empty">Loading...</div></div>';

  const {data:logs,error}=await sb.from('plan_daily').select('*')
    .eq('owner_id',ME.id).eq('log_date',d).order('created_at',{ascending:false});
  const listEl=document.getElementById('dailyList');
  if(error){listEl.innerHTML='<div class="empty">Error: '+esc(error.message)+'</div>';return}

  if(!logs||!logs.length){
    listEl.innerHTML='<div class="empty">'+(isToday?'Aaj ka pehla kaam log karo 👆':'Is din koi log nahi')+'</div>';
    return;
  }

  // working score
  let score=0;const byCat={};
  logs.forEach(l=>{
    const w=CAT_WEIGHT[l.category]||1;score+=w;
    byCat[l.category]=(byCat[l.category]||0)+1;
  });
  const scoreOut=Math.min(10,Math.round(score));

  let s=`<div class="score-card">
    <div class="score-num">${scoreOut}<span>/10</span></div>
    <div class="score-body">
      <div class="score-lbl">Working Score · ${logs.length} kaam</div>
      <div class="score-cats">${Object.entries(byCat).map(([c,n])=>`<span class="sc-chip" style="background:${(CATS[c]||CATS.Other).c}22;color:${(CATS[c]||CATS.Other).c}">${(CATS[c]||CATS.Other).e} ${c} ${n}</span>`).join('')}</div>
    </div>
  </div>`;

  s+=logs.map(l=>{
    const cat=CATS[l.category]||CATS.Other;
    const t=new Date(l.created_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    return `<div class="dlog">
      <div class="dlog-cat" style="background:${cat.c}">${cat.e}</div>
      <div class="dlog-body">
        <div class="dlog-txt">${esc(l.clean_text||l.raw_text)}</div>
        ${l.attachment_url?`<a class="iln-att" href="${l.attachment_url}" target="_blank">📎 ${esc((l.attachment_name||'File').slice(0,28))}</a>`:''}
        <div class="dlog-meta">${esc(l.category||'Other')} · ${t}${l.who?' · '+esc(l.who):''}</div>
      </div>
      <button class="dlog-del" onclick="delDaily('${l.id}')" title="Delete">✕</button>
    </div>`;
  }).join('');

  listEl.innerHTML=s;

  // time tracking summary + timer
  renderTimeSummary(d);
  if(isToday)renderTimer();
}

// ====== TIME TRACKING ======
let TIMER_INT=null;
async function renderTimer(){
  const box=document.getElementById('timerBox');
  if(!box)return;
  // koi active kaam (started but not ended)?
  const {data:active}=await sb.from('plan_worklog').select('*')
    .eq('owner_id',ME.id).is('ended_at',null).order('started_at',{ascending:false}).limit(1);
  if(TIMER_INT){clearInterval(TIMER_INT);TIMER_INT=null;}

  if(active&&active.length){
    const a=active[0];
    const render=()=>{
      const mins=Math.floor((Date.now()-new Date(a.started_at))/60000);
      const hh=Math.floor(mins/60),mm=mins%60;
      const startT=new Date(a.started_at).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
      box.innerHTML=`<div class="timer-on">
        <div class="timer-left">
          <div class="timer-run">⏱ Chal raha hai: ${hh>0?hh+'h ':''}${mm}m</div>
          <div class="timer-task">${esc(a.clean_text||a.raw_text||'Kaam')} ${a.category?`<span class="sc-chip" style="background:${(CATS[a.category]||CATS.Other).c}22;color:${(CATS[a.category]||CATS.Other).c}">${(CATS[a.category]||CATS.Other).e} ${a.category}</span>`:''}</div>
          <div class="timer-start">🕐 Shuru: ${startT}</div>
        </div>
        <button class="btn green" onclick="stopWork('${a.id}')">✓ Khatam</button>
      </div>`;
    };
    render();TIMER_INT=setInterval(render,30000);
  }else{
    box.innerHTML=`<div class="timer-off">
      <input id="workText" placeholder="🎤 Kaam start: jaise 'JV papers study' ya 'accounts ka kaam'">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="mic" id="wMicBtn" onclick="toggleWorkMic()">🎤</button>
        <button class="btn" onclick="startWork()">⏱ Kaam start karo</button>
      </div>
    </div>`;
  }
}

async function startWork(){
  const txt=document.getElementById('workText').value.trim();
  if(!txt){toast('Kya kaam? likho ya bolo');return}
  // AI se category + goal guess
  let category='Other',clean=txt,wgoal_id=null;
  try{
    const r=await fetch('/api/ai-steps',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({idea:txt,mode:'daily'})});
    const j=await r.json();
    if(j.category)category=j.category;
    if(j.clean)clean=j.clean;
  }catch(e){}
  // goal guess: active cycle ke goals me se category match
  try{
    const {data:cyc}=await sb.from('plan_cycles').select('id').eq('status','active').limit(1);
    if(cyc&&cyc.length){
      const {data:gs}=await sb.from('plan_wgoals').select('id,title').eq('cycle_id',cyc[0].id);
      if(gs){const m=gs.find(g=>g.title.toLowerCase().includes(category.toLowerCase())||
        (category==='JV / Investor'&&g.title.toLowerCase().includes('jv'))||
        (category==='Expansion'&&(g.title.toLowerCase().includes('capacity')||g.title.toLowerCase().includes('machine'))));
        if(m)wgoal_id=m.id;}
    }
  }catch(e){}
  await sb.from('plan_worklog').insert({owner_id:ME.id,raw_text:txt,clean_text:clean,category,wgoal_id,started_at:new Date().toISOString(),log_date:todayStr()});
  toast('Kaam start ⏱');renderTimer();
}

async function stopWork(id){
  const {data:w}=await sb.from('plan_worklog').select('*').eq('id',id).single();
  const mins=Math.max(1,Math.round((Date.now()-new Date(w.started_at))/60000));
  openStopModal(id,mins,w);
}

function openStopModal(id,mins,w){
  document.getElementById('modalRoot').innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Kaam khatam — ${mins} min laga</h3>
        <div class="field">
          <label>Notes — kya hua / kya pending (optional)</label>
          <textarea id="stopNotes" placeholder="jaise: governance clause final, ROFR pending, lawyer ko bheja"></textarea>
          <button class="mic sm" id="snMic" onclick="toggleStopMic()" style="margin-top:6px">🎤 Bolke likho</button>
        </div>
        <div class="field">
          <label>Category</label>
          <select id="stopCat">${Object.keys(CATS).map(c=>`<option ${w.category===c?'selected':''}>${c}</option>`).join('')}</select>
        </div>
        <div class="modal-actions">
          <button class="btn gray" onclick="closeModal()">Cancel</button>
          <button class="btn green" onclick="confirmStop('${id}',${mins})">Save</button>
        </div>
      </div>
    </div>`;
}

async function confirmStop(id,mins){
  const notes=document.getElementById('stopNotes').value.trim()||null;
  const cat=document.getElementById('stopCat').value;
  await sb.from('plan_worklog').update({ended_at:new Date().toISOString(),minutes:mins,notes,category:cat}).eq('id',id);
  closeModal();toast(`${mins} min logged ✓`);renderTimer();renderTimeSummary(todayStr());
}

async function renderTimeSummary(d){
  const {data:logs}=await sb.from('plan_worklog').select('*')
    .eq('owner_id',ME.id).eq('log_date',d).not('minutes','is',null).order('started_at');
  const el=document.getElementById('timeSummary');
  if(!logs||!logs.length){if(el)el.remove();return}
  const byCat={};let total=0;
  logs.forEach(l=>{const c=l.category||'Other';byCat[c]=(byCat[c]||0)+(l.minutes||0);total+=l.minutes||0;});
  const fmt=m=>{const h=Math.floor(m/60),mm=m%60;return (h>0?h+'h ':'')+mm+'m'};
  const tm=ts=>ts?new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}):'—';
  let html=`<div class="time-sum" id="timeSummary"><div class="ts-head">⏱ Aaj productivity kahan gayi · total ${fmt(total)}</div>`;
  html+=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([c,m])=>{
    const cat=CATS[c]||CATS.Other;const pct=Math.round(m/total*100);
    return `<div class="ts-row"><div class="ts-lbl">${cat.e} ${c}</div><div class="ts-bar"><i style="width:${pct}%;background:${cat.c}"></i></div><div class="ts-min">${fmt(m)}</div></div>`;
  }).join('');
  // detailed log: kaam + shuru + khatam + time
  html+='<div class="tlog-head">Aaj ke kaam (shuru → khatam)</div>';
  html+=logs.map(l=>{
    const cat=CATS[l.category]||CATS.Other;
    return `<div class="tlog-item">
      <div class="tlog-dot" style="background:${cat.c}">${cat.e}</div>
      <div class="tlog-body">
        <div class="tlog-txt">${esc(l.clean_text||l.raw_text||'Kaam')}</div>
        <div class="tlog-time">🕐 ${tm(l.started_at)} → ${tm(l.ended_at)} · <b>${fmt(l.minutes)}</b></div>
        ${l.notes?`<div class="tlog-note">📝 ${esc(l.notes)}</div>`:''}
      </div>
    </div>`;
  }).join('');
  html+='</div>';
  const existing=document.getElementById('timeSummary');
  if(existing){existing.outerHTML=html;}
  else{const list=document.getElementById('dailyList');if(list)list.insertAdjacentHTML('beforebegin',html);}
}

// work + stop voice mics
function toggleWorkMic(){startVoice('wMicBtn','workText','c')}

function shiftDaily(dir){
  const d=new Date(DAILY_VIEW_DATE);d.setDate(d.getDate()+dir);
  const ns=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  if(ns>todayStr())return;
  DAILY_VIEW_DATE=ns;renderDaily();
}

async function addDaily(){
  const ta=document.getElementById('dailyText');
  const text=ta.value.trim();
  const fEl=document.getElementById('dailyFile');
  const file=fEl&&fEl.files&&fEl.files[0];
  if(!text&&!file){toast('Kuch likho ya bolo');return}
  const btn=document.getElementById('dLogBtn');
  btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;

  // file upload (agar hai)
  let attachUrl=null,attachName=null;
  if(file){
    if(file.size>15*1024*1024){toast('File 15MB se badi hai');btn.innerHTML='Log karo';btn.disabled=false;return}
    try{
      const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
      const path=ME.id+'/daily/'+Date.now()+'_'+safe;
      const {error:upErr}=await sb.storage.from('plan-files').upload(path,file);
      if(upErr)throw upErr;
      const {data:pub}=sb.storage.from('plan-files').getPublicUrl(path);
      attachUrl=pub.publicUrl;attachName=file.name;
    }catch(e){toast('File upload fail: '+e.message);btn.innerHTML='Log karo';btn.disabled=false;return}
  }

  let category='Other',clean=text||('📎 '+(attachName||'File'));
  if(text){
    try{
      const r=await fetch('/api/ai-steps',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({idea:text,mode:'daily'})});
      const j=await r.json();
      if(j.category)category=j.category;
      if(j.clean)clean=j.clean;
    }catch(e){/* fallback: as-is */}
  }
  const {error}=await sb.from('plan_daily').insert({
    owner_id:ME.id,raw_text:text||clean,clean_text:clean,category,log_date:todayStr(),attachment_url:attachUrl,attachment_name:attachName
  });
  btn.innerHTML='Log karo';btn.disabled=false;
  if(error){toast('Error: '+error.message);return}
  ta.value='';if(fEl)fEl.value='';
  toast('Log ho gaya 📓'+(attachUrl?' (file ke saath)':''));renderDaily();
}

async function delDaily(id){
  await sb.from('plan_daily').delete().eq('id',id);
  toast('Delete');renderDaily();
}

// Shared phone-friendly voice function
let VOICE={d:{rec:null,on:false},c:{rec:null,on:false}};
function startVoice(btnId,textId,key){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Is phone/browser me voice support nahi. Type karke daalo.');return}
  const btn=document.getElementById(btnId);
  const v=VOICE[key];
  // already recording? stop
  if(v.on){try{v.rec.stop()}catch(e){}v.on=false;btn.classList.remove('rec');btn.textContent='🎤';return}

  const rec=new SR();
  rec.lang='hi-IN';
  rec.continuous=false;        // phone pe zyada reliable
  rec.interimResults=true;
  rec.maxAlternatives=1;
  v.rec=rec;
  const ta=document.getElementById(textId);
  let base=ta.value;

  rec.onresult=e=>{
    let txt='';
    for(let i=0;i<e.results.length;i++)txt+=e.results[i][0].transcript;
    ta.value=(base?base+' ':'')+txt;
  };
  rec.onend=()=>{v.on=false;btn.classList.remove('rec');btn.textContent='🎤'};
  rec.onerror=ev=>{
    v.on=false;btn.classList.remove('rec');btn.textContent='🎤';
    if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){
      toast('Mic permission do — settings me allow karo');
    }else if(ev.error==='no-speech'){
      toast('Kuch suna nahi — dobara bolo');
    }else if(ev.error==='network'){
      toast('Internet check karo (voice ke liye net chahiye)');
    }else{
      toast('Voice error: '+ev.error);
    }
  };
  try{
    rec.start();v.on=true;btn.classList.add('rec');btn.textContent='⏹';
  }catch(e){
    toast('Voice start nahi hua, dobara try karo');
  }
}
